<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>MEMORY MODE</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
–cyan: #00e5ff;
–purple: #7c3aed;
–pink: #f472b6;
–bg: #07070f;
–card: rgba(255,255,255,0.04);
}

body {
font-family: ‘Space Grotesk’, ‘Tajawal’, sans-serif;
background: #07070f;
color: #fff;
min-height: 100vh;
min-height: 100dvh;
display: flex;
align-items: flex-start;
justify-content: center;
overflow-y: auto;
overflow-x: hidden;
}

/* خلفية */
.bg-layer {
position: fixed; inset: 0; z-index: 0;
background:
radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,229,255,0.06) 0%, transparent 70%),
radial-gradient(ellipse 50% 40% at 80% 100%, rgba(124,58,237,0.08) 0%, transparent 70%);
}

.grid-bg {
position: fixed; inset: 0; z-index: 0;
background-image:
linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
background-size: 48px 48px;
}

.wrap {
position: relative; z-index: 1;
width: 100%; max-width: 400px;
padding: 24px 20px;
}

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.active { display: block; }

/* ===== START SCREEN ===== */
.start-logo {
text-align: center;
margin-bottom: 40px;
}

.logo-mark {
display: inline-flex;
gap: 4px;
margin-bottom: 20px;
}

.logo-bar {
width: 8px;
border-radius: 4px;
background: linear-gradient(180deg, #00e5ff, #7c3aed);
box-shadow: 0 0 10px rgba(0,229,255,0.5);
}

.logo-bar:nth-child(1) { height: 24px; }
.logo-bar:nth-child(2) { height: 36px; }
.logo-bar:nth-child(3) { height: 28px; }
.logo-bar:nth-child(4) { height: 42px; }
.logo-bar:nth-child(5) { height: 20px; }

.game-title { direction: ltr; unicode-bidi: embed;
font-family: ‘Space Grotesk’, sans-serif;
font-size: 2.2rem;
font-weight: 700;
letter-spacing: 6px;
text-transform: uppercase;
background: linear-gradient(135deg, #fff 0%, #00e5ff 60%, #7c3aed 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 8px;
}

.game-subtitle { direction: ltr; unicode-bidi: embed;
font-size: 0.8rem;
color: rgba(255,255,255,0.3);
letter-spacing: 2px;
text-transform: uppercase;
}

/* بطاقة التعليمات */
.rules-card {
background: rgba(255,255,255,0.03);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 20px;
padding: 24px;
margin-bottom: 28px;
position: relative;
overflow: hidden;
}

.rules-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(0,229,255,0.4), transparent);
}

.rule-line {
display: flex;
align-items: center;
justify-content: center;
padding: 10px 0;
border-bottom: 1px solid rgba(255,255,255,0.04);
}

.rule-line:last-child { border-bottom: none; }

.rule-num {
width: 24px; height: 24px;
border-radius: 6px;
background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(124,58,237,0.2));
border: 1px solid rgba(0,229,255,0.3);
display: flex; align-items: center; justify-content: center;
font-size: 0.72rem;
font-weight: 700;
color: #00e5ff;
flex-shrink: 0;
font-family: ‘Space Grotesk’, sans-serif;
}

.rule-text {
font-size: 0.88rem;
color: rgba(255,255,255,0.6);
letter-spacing: 0.5px;
}

/* زر PLAY */
.btn-play {
width: 100%;
padding: 18px;
background: linear-gradient(135deg, #00e5ff, #7c3aed);
border: none;
border-radius: 16px;
font-family: ‘Space Grotesk’, sans-serif;
font-size: 1rem;
font-weight: 700;
letter-spacing: 4px;
color: #fff;
cursor: pointer;
position: relative;
overflow: hidden;
box-shadow: 0 0 30px rgba(0,229,255,0.25), 0 0 60px rgba(124,58,237,0.15);
animation: pulse-btn 2.5s ease-in-out infinite;
transition: transform 0.15s;
}

.btn-play:active { transform: scale(0.97); }

@keyframes pulse-btn {
0%, 100% { box-shadow: 0 0 30px rgba(0,229,255,0.25), 0 0 60px rgba(124,58,237,0.15); }
50% { box-shadow: 0 0 50px rgba(0,229,255,0.45), 0 0 80px rgba(124,58,237,0.3); }
}

/* ===== GAME SCREEN ===== */
.hud {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 24px;
}

.hud-block {
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 12px;
padding: 10px 16px;
text-align: center;
min-width: 80px;
}

.hud-label {
font-size: 0.62rem;
color: rgba(255,255,255,0.3);
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 3px;
}

.hud-val {
font-family: ‘Space Grotesk’, sans-serif;
font-size: 1.4rem;
font-weight: 700;
color: #00e5ff;
}

/* حياة */
.lives-wrap {
display: flex;
gap: 10px;
align-items: center;
}

.life-heart {
width: 26px;
height: 24px;
transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.life-heart svg { width: 100%; height: 100%; }

.life-heart.lost {
transform: scale(0.8);
opacity: 0.2;
}

.life-heart.lost .hfill { fill: #333; }
.life-heart.lost .hshine { fill: #222; }

/* مربع العرض */
.display-box {
background: rgba(0,229,255,0.03);
border: 1px solid rgba(0,229,255,0.12);
border-radius: 20px;
min-height: 130px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
margin-bottom: 16px;
position: relative;
overflow: hidden;
transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}

.display-box::after {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3), transparent);
}

.display-box.flash-correct {
background: rgba(0,255,120,0.1);
border-color: rgba(0,255,120,0.4);
box-shadow: 0 0 30px rgba(0,255,120,0.15);
}

.display-box.flash-wrong {
background: rgba(255,60,60,0.1);
border-color: rgba(255,60,60,0.4);
box-shadow: 0 0 30px rgba(255,60,60,0.15);
animation: shake 0.35s ease;
}

@keyframes shake {
0%,100% { transform: translateX(0); }
20% { transform: translateX(-8px); }
40% { transform: translateX(8px); }
60% { transform: translateX(-5px); }
80% { transform: translateX(5px); }
}

.display-sublabel {
font-size: 0.62rem;
color: rgba(255,255,255,0.25);
letter-spacing: 2.5px;
text-transform: uppercase;
margin-bottom: 8px;
}

.display-number { direction: ltr; unicode-bidi: embed;
font-family: ‘Space Grotesk’, sans-serif;
font-size: 3.5rem;
font-weight: 700;
color: #00e5ff;
text-shadow: 0 0 40px rgba(0,229,255,0.6);
animation: numPop 0.2s cubic-bezier(0.34,1.56,0.64,1);
letter-spacing: 4px;
}

@keyframes numPop {
from { transform: scale(0.5); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}

.display-text { direction: ltr; unicode-bidi: embed;
font-size: 0.8rem;
color: rgba(255,255,255,0.3);
letter-spacing: 4px;
text-transform: uppercase;
}

/* شريط التقدم */
.progress-wrap { margin-bottom: 20px; }

.progress-top {
display: flex;
justify-content: space-between;
font-size: 0.65rem;
color: rgba(255,255,255,0.25);
letter-spacing: 1.5px;
text-transform: uppercase;
margin-bottom: 6px;
}

.progress-track {
height: 3px;
background: rgba(255,255,255,0.05);
border-radius: 99px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, #00e5ff, #7c3aed);
border-radius: 99px;
transition: width 0.5s ease;
box-shadow: 0 0 6px rgba(0,229,255,0.4);
}

/* خانة الإدخال */
.input-wrap {
margin-bottom: 12px;
transition: opacity 0.3s;
}

.input-box {
width: 100%;
background: #0f0f1e;
border: 1.5px solid rgba(255,255,255,0.1);
border-radius: 16px;
min-height: 70px;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 10px;
transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
position: relative;
overflow: hidden;
}

.input-box::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(0,229,255,0.2), transparent);
}

.input-box.active {
border-color: rgba(0,229,255,0.35);
box-shadow: 0 0 20px rgba(0,229,255,0.08);
}

.input-box.flash-correct {
background: rgba(0,255,120,0.1);
border-color: rgba(0,255,120,0.5);
box-shadow: 0 0 20px rgba(0,255,120,0.2);
}

.input-box.flash-wrong {
background: rgba(255,60,60,0.1);
border-color: rgba(255,60,60,0.5);
box-shadow: 0 0 20px rgba(255,60,60,0.2);
animation: shake 0.35s ease;
}

.real-input {
position: absolute;
width: 100%; height: 100%;
opacity: 0;
font-size: 16px;
border: none;
outline: none;
background: transparent;
cursor: pointer;
z-index: 2;
}

.input-display { direction: ltr; unicode-bidi: embed;
font-family: ‘Space Grotesk’, sans-serif;
font-size: 2rem;
font-weight: 700;
color: #fff;
letter-spacing: 10px;
z-index: 1;
}

.input-placeholder {
font-size: 0.78rem;
color: rgba(255,255,255,0.2);
letter-spacing: 3px;
text-transform: uppercase;
z-index: 1;
}

/* زر ENTER */
.btn-enter {
width: 100%;
padding: 16px;
background: linear-gradient(135deg, #00e5ff, #0099cc);
border: none;
border-radius: 14px;
font-family: ‘Space Grotesk’, sans-serif;
font-size: 0.9rem;
font-weight: 700;
letter-spacing: 4px;
color: #000;
cursor: pointer;
box-shadow: 0 4px 20px rgba(0,229,255,0.25);
transition: all 0.15s;
}

.btn-enter:active { transform: scale(0.97); }
.btn-enter:disabled { opacity: 0.3; pointer-events: none; }

/* زر ثانوي */
.btn-ghost {
width: 100%;
padding: 13px;
background: transparent;
border: 1px solid rgba(255,255,255,0.08);
border-radius: 12px;
font-family: ‘Space Grotesk’, sans-serif;
font-size: 0.78rem;
font-weight: 700;
letter-spacing: 2px;
color: rgba(255,255,255,0.3);
cursor: pointer;
transition: all 0.2s;
margin-top: 10px;
text-transform: uppercase;
}

.btn-ghost:hover { border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); }

/* ===== RESULT SCREEN ===== */
.result-wrap { text-align: center; padding: 40px 0 20px; }

.result-tag {
display: inline-block;
font-family: ‘Space Grotesk’, sans-serif;
font-size: 0.7rem;
letter-spacing: 3px;
text-transform: uppercase;
color: rgba(255,255,255,0.3);
border: 1px solid rgba(255,255,255,0.08);
border-radius: 99px;
padding: 5px 16px;
margin-bottom: 20px;
}

.result-title {
font-family: ‘Space Grotesk’, sans-serif;
font-size: 2rem;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 32px;
}

.result-scores {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
margin-bottom: 32px;
}

.result-score-box {
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.07);
border-radius: 16px;
padding: 20px 12px;
}

.result-score-label {
font-size: 0.62rem;
color: rgba(255,255,255,0.3);
letter-spacing: 2px;
text-transform: uppercase;
margin-bottom: 6px;
}

.result-score-val {
font-family: ‘Space Grotesk’, sans-serif;
font-size: 2.2rem;
font-weight: 700;
color: #00e5ff;
text-shadow: 0 0 20px rgba(0,229,255,0.4);
}

/* العد التنازلي داخل مربع العرض */
.countdown-svg {
display: none;
}

/* إخفاء */
.hidden { display: none !important; }
</style>

</head>

<script>
  let seq = [], level = 1, lives = 3, best = 0, phase = 'idle';

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startGame() {
    seq = []; level = 1; lives = 3; phase = 'idle';
    showScreen('gameScreen');
    updateHUD();
    renderLives();
    runCountdown(() => nextRound());
  }

  function runCountdown(cb) {
    const svg = document.getElementById('countdownSvg');
    const circle = document.getElementById('countdownCircle');
    const el = document.getElementById('displayEl');
    const sub = document.getElementById('displaySub');

    svg.style.display = 'block';
    el.textContent = '';
    sub.textContent = '';

    const circumference = 251;
    const totalMs = 1600;
    const start = performance.now();
    circle.setAttribute('stroke-dashoffset', circumference);

    function animate(now) {
      const p = Math.min((now - start) / totalMs, 1);
      circle.setAttribute('stroke-dashoffset', circumference - circumference * p);
      if (p < 1) { requestAnimationFrame(animate); }
      else {
        svg.style.display = 'none';
        cb();
      }
    }
    requestAnimationFrame(animate);
  }

  function nextRound() {
    phase = 'showing';
    clearInputUI();
    lockInput(true);
    seq.push(Math.floor(Math.random() * 10));
    updateHUD();
    setDisplayText('WATCH CLOSELY', ''); document.getElementById('displayEl').dir='ltr';
    setTimeout(() => showSeq(0), 700);
  }

  function showSeq(i) {
    if (i >= seq.length) {
      setDisplayText('YOUR TURN', ''); document.getElementById('displayEl').dir='ltr';
      lockInput(false);
      document.getElementById('userInput').focus(); window.scrollTo(0,0);
      phase = 'input';
      return;
    }
    const fontSize = seq.length <= 4 ? '3.5rem' : seq.length <= 7 ? '2.8rem' : seq.length <= 10 ? '2.2rem' : '1.6rem';
    setDisplayNumber(seq[i].toString(), `${i + 1} OF ${seq.length}`, fontSize);
    setTimeout(() => {
      setDisplayText('', '');
      setTimeout(() => showSeq(i + 1), 180);
    }, 650);
  }

  function setDisplayNumber(num, sub, fontSize) {
    const el = document.getElementById('displayEl');
    const subEl = document.getElementById('displaySub');
    el.className = 'display-number';
    el.style.fontSize = fontSize || '3.5rem';
    el.textContent = num;
    subEl.textContent = sub;
    subEl.dir = 'ltr';
  }

  function setDisplayText(text, sub) {
    const el = document.getElementById('displayEl');
    const subEl = document.getElementById('displaySub');
    el.className = 'display-text';
    el.style.fontSize = '';
    el.textContent = text;
    subEl.textContent = sub;
  }

  function handleInput(inp) {
    inp.value = inp.value.replace(/[^0-9]/g, '');
    if (inp.value.length > seq.length) inp.value = inp.value.slice(0, seq.length);

    const disp = document.getElementById('inputDisplay');
    const ph = document.getElementById('inputPlaceholder');
    if (inp.value.length > 0) {
      disp.textContent = inp.value;
      disp.classList.remove('hidden');
      ph.classList.add('hidden');
    } else {
      disp.classList.add('hidden');
      ph.classList.remove('hidden');
    }
  }

  function checkAnswer() {
    if (phase !== 'input') return;
    const val = document.getElementById('userInput').value.trim();
    const correct = seq.join('');
    if (!val) return;

    if (val === correct) {
      flashBox('correct');
      setDisplayText('NICE!', '');
      level++;
      if (level - 1 > best) best = level - 1;
      lockInput(true);
      setTimeout(() => runCountdown(() => nextRound()), 900);
    } else {
      lives--;
      renderLives();
      flashBox('wrong');
      setDisplayText('WRONG', '');
      if (lives <= 0) {
        if (level - 1 > best) best = level - 1;
        setTimeout(() => showResult(), 1000);
      } else {
        setTimeout(() => {
          setDisplayText('YOUR TURN', ''); document.getElementById('displayEl').dir='ltr';
          clearInputUI();
          document.getElementById('userInput').value = '';
          document.getElementById('userInput').focus(); window.scrollTo(0,0);
        }, 900);
      }
    }
  }

  function flashBox(type) {
    const box = document.getElementById('inputBox');
    box.classList.add(type === 'correct' ? 'flash-correct' : 'flash-wrong');
    if (type === 'wrong') {
      document.getElementById('displayBox').classList.add('flash-wrong');
    }
    setTimeout(() => {
      box.classList.remove('flash-correct', 'flash-wrong');
      document.getElementById('displayBox').classList.remove('flash-wrong');
    }, 600);
  }

  function clearInputUI() {
    const disp = document.getElementById('inputDisplay');
    const ph = document.getElementById('inputPlaceholder');
    disp.classList.add('hidden');
    ph.classList.remove('hidden');
    document.getElementById('userInput').value = '';
  }

  function lockInput(lock) {
    const wrap = document.getElementById('inputWrap');
    wrap.style.opacity = lock ? '0.25' : '1';
    wrap.style.pointerEvents = lock ? 'none' : 'all';
  }

  function updateHUD() {
    document.getElementById('hudLevel').textContent = level;
    document.getElementById('hudBest').textContent = best;
    document.getElementById('progLabel').textContent = `LEVEL ${level}`;
    document.getElementById('progFill').style.width = Math.min((level / 20) * 100, 100) + '%';
  }

  function renderLives() {
    const hearts = document.querySelectorAll('.life-heart');
    hearts.forEach((h, i) => h.classList.toggle('lost', i >= lives));
  }

  function showResult() {
    showScreen('resultScreen');
    const reached = level - 1;
    document.getElementById('resultScore').textContent = reached;
    document.getElementById('resultBest').textContent = best;
    const title = document.getElementById('resultTitle');
    if (reached >= 12) title.textContent = 'LEGENDARY';
    else if (reached >= 8) title.textContent = 'IMPRESSIVE';
    else if (reached >= 5) title.textContent = 'NOT BAD';
    else title.textContent = 'GAME OVER';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && phase === 'input') checkAnswer();
  });
</script>

</body>
</html>
